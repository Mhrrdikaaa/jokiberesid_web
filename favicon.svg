<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill="none">
  <!-- Outer Circle Border -->
  <circle cx="100" cy="100" r="94" fill="#F8F9FA" stroke="#0A4D8A" stroke-width="16"/>
  
  <!-- Inner Dark Blue Circle -->
  <circle cx="100" cy="100" r="76" fill="#0A4D8A"/>
  
  <!-- Medium Blue Accent Ring -->
  <circle cx="100" cy="100" r="68" fill="none" stroke="#1E6AB8" stroke-width="8"/>
  
  <!-- Huruf J Putih Tebal -->
  <text 
    x="100" 
    y="118" 
    font-family="Arial Black, sans-serif" 
    font-size="125" 
    font-weight="900" 
